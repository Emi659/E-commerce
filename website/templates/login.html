{% extends 'forms.html' %}

{% block title %} Login {% endblock %}

{% block body %}



<section class="base" id="base-signup">
    <div class="base-content">
        <div class="form">
            <h3>
                Inicia sesion <br> para comprar
            </h3>

            <hr class="first">
            <form method="post">
                {{ form.hidden_tag() }}

                <div class="email"><h4>Direccion de email</h4>{{ form.email }}<hr></div>
                <div class="email"><h4>Contraseña</h4>{{ form.password }}<hr></div>
               

                <div class="buttons">
                    <a href="/sign-up"> Registrate</a>
                    {{ form.submit() }}
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
